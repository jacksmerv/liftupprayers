<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>YouTube Shorts Gallery</title>\n    <style>\n        body { font-family: Arial, sans-serif; }\n        .shorts { display: flex; flex-wrap: wrap; }\n        .short { margin: 10px; border: 1px solid #ccc; padding: 10px; width: calc(33.333% - 20px); }\n        iframe { width: 100%; height: 200px; }\n    </style>\n</head>\n<body>\n    <h1>YouTube Shorts Gallery</h1>\n    <div class="shorts">\n        <div class="short">\n            <iframe src="video_url" frameborder="0" allowfullscreen></iframe>\n            <h2>Title: video_title</h2>\n            <p>Upload Date: upload_date</p>\n        </div>\n        <!-- Repeat .short div for each video -->\n    </div>\n</body>\n</html>
